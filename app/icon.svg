<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favicon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE875" />
      <stop offset="35%" stop-color="#FFD700" />
      <stop offset="70%" stop-color="#FFA500" />
      <stop offset="100%" stop-color="#B37400" />
    </linearGradient>
    <filter id="fav-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  {/* Outer Dash Circle */}
  <circle cx="50" cy="50" r="44" stroke="url(#favicon-gradient)" stroke-width="5" stroke-dasharray="10 8" />

  {/* Inner Solid Circle */}
  <circle cx="50" cy="50" r="34" stroke="url(#favicon-gradient)" stroke-width="2" opacity="0.6" />

  {/* Left Vertical sprocket bar */}
  <path d="M30 24C30 21.7909 31.7909 20 34 20H38C40.2091 20 42 21.7909 42 24V76C42 78.2091 40.2091 80 38 80H34C31.7909 80 30 78.2091 30 76V24Z" fill="url(#favicon-gradient)" />

  {/* Top sprocket cap */}
  <path d="M24 24C24 21.7909 25.7909 20 28 20H58C60.2091 20 62 21.7909 62 24V28C62 30.2091 60.2091 32 58 32H28C25.7909 32 24 30.2091 24 28V24Z" fill="url(#favicon-gradient)" />

  {/* Play Button */}
  <path d="M48 35C48 32.5 50.5 31 52.5 32.2L74.8 45.1C76.8 46.3 76.8 49.3 74.8 50.5L52.5 63.4C50.5 64.6 48 63.1 48 60.6V35Z" fill="url(#favicon-gradient)" filter="url(#fav-glow)" />
</svg>
