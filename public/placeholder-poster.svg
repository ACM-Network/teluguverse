<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 750" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151724" />
      <stop offset="50%" stop-color="#0a0c16" />
      <stop offset="100%" stop-color="#05060b" />
    </linearGradient>
    
    <!-- Accent Gold Glow -->
    <radialGradient id="goldGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0" />
    </radialGradient>

    <!-- Metallic Gold Gradient -->
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFA500" />
      <stop offset="100%" stop-color="#CC8400" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="750" fill="url(#bgGrad)" />
  <rect width="500" height="750" fill="url(#goldGlow)" />

  <!-- Subtle grid lines to feel techy/cinematic -->
  <path d="M 0 100 L 500 100 M 0 650 L 500 650" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
  <path d="M 100 0 L 100 750 M 400 0 L 400 750" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />

  <!-- Outer Border Frame -->
  <rect x="20" y="20" width="460" height="710" rx="15" fill="none" stroke="url(#goldMetal)" stroke-opacity="0.2" stroke-width="1.5" />
  <rect x="25" y="25" width="450" height="700" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />

  <!-- Center Content Group -->
  <g transform="translate(0, 0)" filter="url(#shadow)">
    <!-- Cinematic Play/Film Emblem -->
    <circle cx="250" cy="330" r="70" fill="#000000" fill-opacity="0.4" stroke="url(#goldMetal)" stroke-opacity="0.3" stroke-width="2" />
    
    <!-- Outer Ring details -->
    <circle cx="250" cy="330" r="82" fill="none" stroke="url(#goldMetal)" stroke-opacity="0.1" stroke-dasharray="10 6" stroke-width="1" />

    <!-- Play Triangle -->
    <path d="M 235 295 L 282 330 L 235 365 Z" fill="url(#goldMetal)" />
  </g>

  <!-- Logo and Branding Text -->
  <g transform="translate(250, 520)">
    <!-- TeluguVerse Logo -->
    <text x="0" y="0" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-weight="900" font-size="28" fill="url(#goldMetal)" letter-spacing="4">TELUGUVERSE</text>
    
    <!-- Premium Entertainment tagline -->
    <text x="0" y="32" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="6">PREMIUM CONTENT</text>
  </g>

  <!-- Bottom Details Decors -->
  <g transform="translate(250, 685)" opacity="0.4">
    <path d="M -40 0 L 40 0" stroke="url(#goldMetal)" stroke-width="1" />
    <polygon points="0,-4 -4,0 0,4 4,0" fill="url(#goldMetal)" />
  </g>
</svg>
