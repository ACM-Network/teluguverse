<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141622" />
      <stop offset="50%" stop-color="#0a0c16" />
      <stop offset="100%" stop-color="#05060a" />
    </linearGradient>

    <!-- Accent Gold Glow -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0" />
    </radialGradient>

    <!-- Metallic Gold Gradient -->
    <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFA500" />
      <stop offset="100%" stop-color="#CC8400" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.9" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)" />
  <rect width="1920" height="1080" fill="url(#goldGlow)" />

  <!-- Subtle grid lines to feel techy/cinematic -->
  <path d="M 0 180 L 1920 180 M 0 900 L 1920 900" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />
  <path d="M 380 0 L 380 1080 M 1540 0 L 1540 1080" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />

  <!-- Outer Border Frame -->
  <rect x="40" y="40" width="1840" height="1000" rx="24" fill="none" stroke="url(#goldMetal)" stroke-opacity="0.15" stroke-width="2" />

  <!-- Center Content Group -->
  <g transform="translate(0, 0)" filter="url(#shadow)">
    <!-- Cinematic Play/Film Emblem -->
    <circle cx="960" cy="460" r="100" fill="#000000" fill-opacity="0.45" stroke="url(#goldMetal)" stroke-opacity="0.25" stroke-width="2.5" />
    <circle cx="960" cy="460" r="120" fill="none" stroke="url(#goldMetal)" stroke-opacity="0.08" stroke-dasharray="14 10" stroke-width="1.5" />

    <!-- Play Triangle -->
    <path d="M 940 410 L 1005 460 L 940 510 Z" fill="url(#goldMetal)" />
  </g>

  <!-- Logo and Branding Text -->
  <g transform="translate(960, 710)">
    <!-- TeluguVerse Logo -->
    <text x="0" y="0" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-weight="900" font-size="44" fill="url(#goldMetal)" letter-spacing="8">TELUGUVERSE</text>
    
    <!-- Tagline -->
    <text x="0" y="45" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#ffffff" fill-opacity="0.3" letter-spacing="10">CINEMATIC ENTERTAINMENT</text>
  </g>

  <!-- Side Decorative corner lines -->
  <g stroke="url(#goldMetal)" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 60 100 L 60 60 L 100 60" />
    <path d="M 1860 100 L 1860 60 L 1820 60" />
    <path d="M 60 980 L 60 1020 L 100 1020" />
    <path d="M 1860 980 L 1860 1020 L 1820 1020" />
  </g>
</svg>
